```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallpaperVerse</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:#fff;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:#111827;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:24px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}

nav a:hover{
    color:#38bdf8;
}

.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(135deg,#0ea5e9,#7c3aed);
}

.hero h1{
    font-size:54px;
    margin-bottom:15px;
}

.hero p{
    font-size:18px;
    opacity:.9;
}

.categories{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:30px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card svg{
    width:70px;
    height:70px;
    margin-bottom:15px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:40px;
}

.wallpaper{
    height:220px;
    border-radius:15px;
    overflow:hidden;
    position:relative;
}

.wallpaper:nth-child(1){
    background:linear-gradient(135deg,#22c55e,#15803d);
}

.wallpaper:nth-child(2){
    background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.wallpaper:nth-child(3){
    background:linear-gradient(135deg,#f97316,#ea580c);
}

.wallpaper:nth-child(4){
    background:linear-gradient(135deg,#9333ea,#ec4899);
}

.wallpaper span{
    position:absolute;
    bottom:15px;
    left:15px;
    font-size:20px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    background:#111827;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <div class="logo">

        <!-- SVG Logo -->
        <svg width="40" height="40" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#38bdf8"/>
            <path d="M20 65 L40 35 L55 55 L70 30 L85 65 Z"
                  fill="white"/>
        </svg>

        WallpaperVerse
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Popular</a>
        <a href="#">About</a>
    </nav>
</header>

<section class="hero">
    <h1>Premium Wallpapers</h1>
    <p>Discover stunning backgrounds for desktop and mobile devices.</p>
</section>

<section class="categories">

    <div class="card">
        <!-- Mountain Icon -->
        <svg viewBox="0 0 100 100">
            <polygon points="10,80 40,30 70,80"
                     fill="#22c55e"/>
            <polygon points="35,80 65,20 95,80"
                     fill="#16a34a"/>
        </svg>
        <h3>Nature</h3>
    </div>

    <div class="card">
        <!-- City Icon -->
        <svg viewBox="0 0 100 100">
            <rect x="15" y="35" width="20" height="45" fill="#60a5fa"/>
            <rect x="40" y="20" width="20" height="60" fill="#3b82f6"/>
            <rect x="65" y="10" width="20" height="70" fill="#2563eb"/>
        </svg>
        <h3>City</h3>
    </div>

    <div class="card">
        <!-- Space Icon -->
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="22" fill="#a855f7"/>
            <ellipse cx="50" cy="50" rx="40" ry="12"
                     fill="none"
                     stroke="#e879f9"
                     stroke-width="6"/>
        </svg>
        <h3>Space</h3>
    </div>

    <div class="card">
        <!-- Abstract Icon -->
        <svg viewBox="0 0 100 100">
            <circle cx="35" cy="40" r="20" fill="#f97316"/>
            <circle cx="60" cy="60" r="25" fill="#fb7185"/>
        </svg>
        <h3>Abstract</h3>
    </div>

</section>

<section class="gallery">

    <div class="wallpaper">
        <span>Nature Collection</span>
    </div>

    <div class="wallpaper">
        <span>Ocean Collection</span>
    </div>

    <div class="wallpaper">
        <span>Sunset Collection</span>
    </div>

    <div class="wallpaper">
        <span>Neon Collection</span>
    </div>

</section>

<footer>
    © 2026 WallpaperVerse • All Rights Reserved
</footer>

</body>
</html>
```
